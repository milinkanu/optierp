[pytest]
# Pytest configuration for FinOps project tests
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
markers =
    unit: Unit tests for individual functions
    integration: Integration tests for API endpoints
    auth: Tests related to authentication
    transaction: Tests related to transactions
    invoice: Tests related to invoices
    ledger: Tests related to ledger
    ocr: Tests related to OCR functionality
    compliance: Tests related to compliance
    slow: Tests that take a long time to run

addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

filterwarnings =
    ignore::DeprecationWarning
